<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Acuario Pira Renda</title>
    <link rel="shortcut icon" href="assets/img/pescado.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #000040;
        }

        /* ── HEADER ── */
        .login-header {
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
        }
        .login-header a {
            display: flex;
            align-items: center;
            gap: .6rem;
            text-decoration: none;
            color: #fff;
            font-size: .95rem;
            opacity: .85;
            transition: opacity .15s;
        }
        .login-header a:hover { opacity: 1; }
        .login-header img { height: 36px; }

        /* ── MAIN ── */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .login-card {
            background: #fff;
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,.35);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .login-logo .logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: #000040;
            border-radius: 50%;
            margin-bottom: .75rem;
            box-shadow: 0 4px 12px rgba(0,0,64,.25);
        }
        .login-logo img {
            height: 52px;
            width: 52px;
            object-fit: contain;
        }
        .login-logo h1 {
            font-size: 1.25rem;
            color: #000040;
            font-weight: 700;
        }
        .login-logo p {
            font-size: .85rem;
            color: #6b7280;
            margin-top: .2rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            font-size: .875rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: .35rem;
        }
        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #fff;
            transition: border-color .15s, box-shadow .15s;
        }
        .input-wrap:focus-within {
            border-color: #000040;
            box-shadow: 0 0 0 3px rgba(0,0,64,.12);
        }
        .input-wrap i.fa-user,
        .input-wrap i.fa-lock {
            padding-left: .85rem;
            color: #9ca3af;
            font-size: .9rem;
            flex-shrink: 0;
        }
        .input-wrap input {
            flex: 1;
            padding: .6rem .5rem .6rem .6rem;
            border: none;
            border-radius: 8px;
            font-size: .95rem;
            font-family: inherit;
            background: transparent;
            outline: none;
        }
        .eye-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
            padding: .25rem .75rem;
            font-size: .9rem;
            flex-shrink: 0;
        }
        .eye-btn:hover { color: #000040; }

        .error-msg {
            display: none;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: .6rem .85rem;
            font-size: .875rem;
            margin-bottom: 1rem;
            align-items: center;
            gap: .5rem;
        }
        .error-msg.show { display: flex; }

        .btn-login {
            width: 100%;
            padding: .7rem;
            background: #000040;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background .15s, transform .1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
            margin-top: .25rem;
        }
        .btn-login:hover   { background: #000070; }
        .btn-login:active  { transform: scale(.98); }
        .btn-login:disabled { opacity: .7; cursor: not-allowed; }

        .loader {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: .82rem;
            color: #9ca3af;
        }
        .login-footer a {
            color: #000040;
            text-decoration: none;
            font-weight: 600;
        }
        .login-footer a:hover { text-decoration: underline; }

        /* Sacudida al error */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .shake { animation: shake .35s ease; }
    </style>
</head>
<body>

    <header class="login-header">
        <a href="index.html">
            <img src="assets/img/logo-acuario.png" alt="Logo Pira Renda">
            <span>Volver al inicio</span>
        </a>
    </header>

    <main>
        <div class="login-card">

            <div class="login-logo">
                <div class="logo-wrap">
                    <img src="assets/img/logo-acuario.png" alt="Logo">
                </div>
                <h1>Pira Renda</h1>
                <p>Panel de administración</p>
            </div>

            <div class="error-msg" id="errorMsg">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>Usuario o contraseña incorrectos.</span>
            </div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="usuario" placeholder="Ingresá tu usuario"
                               autocomplete="username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Ingresá tu contraseña"
                               autocomplete="current-password" required>
                        <button type="button" class="eye-btn" onclick="togglePass()" aria-label="Mostrar contraseña">
                            <i class="fa-solid fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    <i class="fa-solid fa-right-to-bracket"></i> Iniciar sesión
                </button>
            </form>

            <p class="login-footer">
                ¿Volvés a la tienda? <a href="index.html">Ir al inicio</a>
            </p>

        </div>
    </main>

    <script>
        // ── Credenciales ──
        const CREDENCIALES = { usuario: 'admin', password: 'pirarenda2026' };

        // Si ya está logueado, redirigir directo al admin
        if (sessionStorage.getItem('prAdmin') === '1') {
            window.location.href = 'admin/index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const usuario  = document.getElementById('usuario').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('btnLogin');
            const errorMsg = document.getElementById('errorMsg');

            // Simular carga
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> Verificando...';
            errorMsg.classList.remove('show');

            setTimeout(() => {
                if (usuario === CREDENCIALES.usuario && password === CREDENCIALES.password) {
                    sessionStorage.setItem('prAdmin', '1');
                    window.location.href = 'admin/index.html';
                } else {
                    errorMsg.classList.add('show');
                    // Sacudir la card
                    const card = document.querySelector('.login-card');
                    card.classList.remove('shake');
                    void card.offsetWidth; // forzar reflow
                    card.classList.add('shake');

                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Iniciar sesión';
                }
            }, 600);
        });

        function togglePass() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-solid fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fa-solid fa-eye';
            }
        }
    </script>

</body>
</html>
