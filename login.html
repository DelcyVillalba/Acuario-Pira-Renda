<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Acuario Pira Renda</title>
    <link rel="shortcut icon" href="assets/img/pescado.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <header class="login-header">
        <a href="index.html">
            <img src="assets/img/logo-acuario.png" alt="Logo Pira Renda">
            <span>Volver al inicio</span>
        </a>
    </header>

    <main>
        <div class="login-card">

            <div class="login-logo">
                <div class="logo-wrap">
                    <img src="assets/img/logo-acuario.png" alt="Logo">
                </div>
                <h1>Pira Renda</h1>
                <p>Panel de administración</p>
            </div>

            <div class="error-msg" id="errorMsg">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>Usuario o contraseña incorrectos.</span>
            </div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="usuario" placeholder="Ingresá tu usuario"
                               autocomplete="username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Ingresá tu contraseña"
                               autocomplete="current-password" required>
                        <button type="button" class="eye-btn" onclick="togglePass()" aria-label="Mostrar contraseña">
                            <i class="fa-solid fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    <i class="fa-solid fa-right-to-bracket"></i> Iniciar sesión
                </button>
            </form>

            <p class="login-footer">
                ¿Volvés a la tienda? <a href="index.html">Ir al inicio</a>
            </p>

        </div>
    </main>

    <script src="js/login.js"></script>

</body>
</html>
